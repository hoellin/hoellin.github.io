- title: Projects
  type: time_table
  contents:
    - title: <a href="https://hoellin.github.io/eg/">Genome-wide identification of E/G interactions</a>
      year: 2020-2022
      description: If the identification of all enhancers present in a given cell type is not a solved problem,
                   the identification of the relationships between enhancers and genes, i.e. which genes are the targets
                   of which enhancers, in a particular cell type is even more complex. In this project, we investigate
                   two of the most recent methods in the field.

